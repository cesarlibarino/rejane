<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação Gratuita - Rejane Santos Nutricionista</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 font-sans min-h-screen flex flex-col justify-between">

    <header class="w-full py-4 bg-white shadow-sm border-b border-slate-100 text-center">
        <h1 class="text-xs font-semibold tracking-wider text-slate-400 uppercase">Avaliação de Perfil Metabólico 40+</h1>
    </header>

    <main class="flex-grow flex items-center justify-center px-4 py-8">
        <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-6 md:p-8 border border-slate-100">
            
            <div class="w-full bg-slate-100 h-2 rounded-full mb-6 overflow-hidden">
                <div id="progress-bar" class="bg-rose-500 h-full w-0 transition-all duration-300"></div>
            </div>

            <div id="quiz-container">
                </div>

        </div>
    </main>

    <footer class="w-full py-4 text-center text-xs text-slate-400">
        &copy; Rejane Santos Nutricionista - Todos os direitos reservados.
    </footer>

    <script>
        // Configuração das perguntas do Quiz
        const quizData = [
            {
                type: "question",
                title: "Qual é o seu principal objetivo hoje?",
                options: [
                    { text: "Eliminar a barriga que não diminui", value: "perder_barriga" },
                    { text: "Recuperar a energia e acabar com o cansaço", value: "mais_energia" },
                    { text: "Emagrecer sem sofrer com os sintomas da menopausa", value: "emagrecer_menopausa" },
                    { text: "Todas as alternativas acima", value: "todas_anteriores" }
                ]
            },
            {
                type: "question",
                title: "Como você sente seu metabolismo após os 40 anos?",
                options: [
                    { text: "Sinto que travou completamente, engordo olhando para a comida", value: "travado" },
                    { text: "Mais lento do que antes, mas ainda consigo manter se fechar a boca", value: "lento" },
                    { text: "Não notei tanta diferença, mas sinto mais cansaço", value: "normal_com_fatiga" }
                ]
            },
            {
                type: "question",
                title: "Como estão seus níveis de energia ao longo do dia?",
                options: [
                    { text: "Já acordo cansada e dependo de café/doces para ter pique", value: "acorda_cansada" },
                    { text: "Tenho energia de manhã, mas no meio da tarde me dá um apagão", value: "queda_tarde" },
                    { text: "Consigo manter o pique, o problema é a insônia à noite", value: "insonia" }
                ]
            },
            {
                type: "lead_form",
                title: "Análise Quase Concluída!",
                subtitle: "Insira seus dados abaixo para liberar o resultado personalizado e falar com a Nutri Rejane Santos."
            }
        ];

        let currentStep = 0;
        const userAnswers = {};

        const quizContainer = document.getElementById('quiz-container');
        const progressBar = document.getElementById('progress-bar');

        function renderStep() {
            // Atualiza barra de progresso
            const progressPercent = ((currentStep) / quizData.length) * 100;
            progressBar.style.width = `${progressPercent}%`;

            const currentData = quizData[currentStep];

            if (currentData.type === "question") {
                renderQuestion(currentData);
            } else if (currentData.type === "lead_form") {
                renderLeadForm(currentData);
            }
        }

        function renderQuestion(data) {
            let optionsHTML = data.options.map((opt, index) => `
                <button onclick="handleOptionSelect('${data.title}', '${opt.value}')" 
                        class="w-full text-left p-4 rounded-xl border border-slate-200 hover:border-rose-500 hover:bg-rose-50/30 text-slate-700 font-medium transition duration-200 focus:outline-none focus:ring-2 focus:ring-rose-500/20 text-sm md:text-base">
                    ${opt.text}
                </button>
            `).join('');

            quizContainer.innerHTML = `
                <div class="fade-in space-y-4">
                    <h2 class="text-xl font-bold text-slate-800 leading-tight mb-6">${data.title}</h2>
                    <div class="space-y-3">
                        ${optionsHTML}
                    </div>
                </div>
            `;
        }

        function handleOptionSelect(question, value) {
            userAnswers[question] = value;
            currentStep++;
            renderStep();
        }

        function renderLeadForm(data) {
            // Garante que a barra mostre 100% na tela de captura
            progressBar.style.width = `100%`;

            quizContainer.innerHTML = `
                <div class="fade-in">
                    <h2 class="text-xl font-bold text-slate-800 leading-tight">${data.title}</h2>
                    <p class="text-sm text-slate-500 mt-2 mb-6">${data.subtitle}</p>
                    
                    <form id="lead-form" onsubmit="handleFormSubmit(event)" class="space-y-4">
                        <div>
                            <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1">Seu Nome</label>
                            <input type="text" id="lead-name" required placeholder="Ex: Maria Silva" 
                                   class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-rose-500 focus:ring-2 focus:ring-rose-500/20 outline-none transition text-slate-700">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1">Seu Melhor E-mail</label>
                            <input type="email" id="lead-email" required placeholder="Ex: maria@email.com" 
                                   class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-rose-500 focus:ring-2 focus:ring-rose-500/20 outline-none transition text-slate-700">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1">Seu WhatsApp (com DDD)</label>
                            <input type="tel" id="lead-phone" required placeholder="Ex: (11) 99999-9999" 
                                   class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-rose-500 focus:ring-2 focus:ring-rose-500/20 outline-none transition text-slate-700">
                        </div>
                        
                        <button type="submit" 
                                class="w-full bg-rose-500 hover:bg-rose-600 text-white font-bold py-4 rounded-xl shadow-lg shadow-rose-500/20 transition duration-200 transform active:scale-[0.98] mt-6">
                            Ver Meu Resultado Personalizado ➔
                        </button>
                    </form>
                </div>
            `;
        }

        function handleFormSubmit(event) {
            event.preventDefault();
            
            const name = document.getElementById('lead-name').value;
            const email = document.getElementById('lead-email').value;
            const phone = document.getElementById('lead-phone').value;

            // Objeto final com todos os leads e respostas guardadas
            const leadData = {
                lead: { name, email, phone },
                answers: userAnswers
            };

            console.log("Dados coletados com sucesso:", leadData);

            // INSIRA AQUI SUA INTEGRAÇÃO (WebHook, Zapier, n8n ou ActiveCampaign)
            
            // Exemplo de redirecionamento para o WhatsApp da Expert (wa.link/mnzo6x) com mensagem personalizada:
            const whatsappBaseUrl = "https://wa.me/5533999999999"; // Ajuste com o número real se não usar o wa.link direto
            const textoMensagem = encodeURIComponent(`Olá Rejane, acabei de fazer o quiz de avaliação metabólica! Meu nome é ${name} e gostaria de ver meu resultado.`);
            
            // Para testar, vamos redirecionar para o link do print modificado ou para o whatsapp:
            window.location.href = `https://wa.link/mnzo6x?text=${textoMensagem}`;
        }

        // Inicializa o quiz
        renderStep();
    </script>
</body>
</html>
